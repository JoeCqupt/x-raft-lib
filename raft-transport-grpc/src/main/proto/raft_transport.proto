syntax = "proto3";

package raft_transport;

option java_package = "io.github.xinfra.lab.raft.transport.grpc.proto";
option java_outer_classname = "RaftTransportProto";
option java_multiple_files = true;

// We carry raw raft Eraftpb.Message bytes inside the wrapper so the wire
// format is decoupled from the Eraftpb proto schema's evolution. (Bumping
// raft-core's protobuf doesn't force a transport rebuild.)

service RaftTransportService {
    // Send a single non-snapshot raft message. Unary RPC is fine for the
    // append/heartbeat/vote/read-index hot path.
    rpc Send(RaftMessage) returns (Ack);

    // Install a snapshot. Server-side stream of chunks because a single
    // protobuf message can't carry >2 GB and we want to be able to
    // back-pressure mid-snapshot.
    rpc InstallSnapshot(stream SnapshotChunk) returns (Ack);
}

message RaftMessage {
    // Sender's raft node id (must match Eraftpb.Message.from in the payload).
    int64 from = 1;
    // Recipient's raft node id (sanity check; transport-level routing).
    int64 to = 2;
    // Serialized Eraftpb.Message bytes.
    bytes payload = 3;
}

message SnapshotChunk {
    // Sender id. Repeated in every chunk so the receiver can reject
    // mid-stream if the chunks are interleaved by mistake.
    int64 from = 1;
    int64 to = 2;
    // Total size of the snapshot bytes (header + body). Set on chunk 0
    // for budgeting; later chunks may set 0.
    int64 total_bytes = 3;
    // Byte offset of this chunk's payload within the full snapshot.
    int64 offset = 4;
    // The chunk bytes. The full snapshot is the concatenation of all
    // chunks' payload fields in order.
    bytes payload = 5;
    // Whether this is the last chunk.
    bool last = 6;
}

message Ack {
    // True if the message was accepted by the receiver. False indicates a
    // transport-level rejection (wrong recipient, transport closed, ...);
    // the caller should retry or report unreachable.
    bool ok = 1;
    string error = 2;
}
