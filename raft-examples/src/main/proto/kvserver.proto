syntax = "proto3";

package kvserver;

option java_package = "io.github.xinfra.lab.raft.examples.proto";
option java_outer_classname = "KvServerProto";
option java_multiple_files = true;

service KvService {
    rpc Get(GetRequest) returns (GetResponse);
    rpc Put(PutRequest) returns (PutResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message GetRequest {
    string key = 1;
}

message GetResponse {
    string value = 1;
    bool found = 2;
}

message PutRequest {
    string key = 1;
    string value = 2;
}

message PutResponse {}

message DeleteRequest {
    string key = 1;
}

message DeleteResponse {}

message KvSnapshotData {
    repeated KvEntry entries = 1;
}

message KvEntry {
    string key = 1;
    string value = 2;
}

// Serialized into raft log entries as the state-machine command.
message KvCommand {
    enum Op {
        PUT = 0;
        DELETE = 1;
    }
    Op op = 1;
    string key = 2;
    string value = 3;
}
