name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test (${{ matrix.os }} / JDK ${{ matrix.jdk }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # rocksdbjni ships native binaries for linux-x86_64 / linux-aarch64 /
        # darwin-{x86_64,aarch64} / windows-x86_64; gRPC binds real ports.
        # We need to exercise all three host OSes, not just linux, to catch
        # platform-specific drift (path separators, fsync semantics, port
        # allocation, line endings). macos-latest is arm64 (M1).
        os: ['ubuntu-latest', 'macos-latest', 'windows-latest']
        jdk: ['17', '21']

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
          cache: maven

      - name: Show versions
        run: |
          java -version
          mvn -v

      # The full coverage gate only runs on the canonical platform
      # (ubuntu / JDK 17) so the other OS jobs aren't paying jacoco's
      # ~10% overhead and we don't end up with three separate coverage
      # reports to reconcile. Cross-OS runs still execute every test;
      # they just skip the instrumentation + check goal.
      #
      # `shell: bash` is set explicitly because GitHub Actions defaults
      # to PowerShell on windows-latest, and PowerShell tokenises
      # `-Djacoco.skip=true` as `-D jacoco.skip=true`, making Maven
      # treat ".skip=true" as a phase. Git Bash is preinstalled on
      # windows-latest, so bash works on every leg of the matrix.
      - name: Build & test (multi-module reactor)
        if: matrix.os == 'ubuntu-latest' && matrix.jdk == '17'
        shell: bash
        run: mvn -B -ntp install
      - name: Build & test (no jacoco, full reactor)
        if: matrix.os != 'windows-latest' && (matrix.os != 'ubuntu-latest' || matrix.jdk != '17')
        shell: bash
        run: mvn -B -ntp install -Djacoco.skip=true
      # rocksdbjni 10.10.1's Windows native binary is missing JNI bridge
      # symbols (`UnsatisfiedLink: ColumnFamilyOptions.disposeInternalJni`
      # and friends), so any module that touches RocksDB fails to even
      # construct a storage instance. This is a known upstream packaging
      # issue. Until rocksdb-jvm ships a working windows-x86_64 build, we
      # skip the rocksdb-tied modules on Windows but still exercise
      # raft-proto / raft-core / raft-transport-grpc — which is where most
      # of the platform-specific risk (path separators, fsync semantics,
      # netty / gRPC port handling) lives anyway.
      - name: Build & test (Windows; skip rocksdb modules)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: mvn -B -ntp install -Djacoco.skip=true -pl '!raft-storage-rocksdb,!raft-tests,!raft-examples'

      - name: Upload JaCoCo HTML report (raft-core)
        if: always() && matrix.os == 'ubuntu-latest' && matrix.jdk == '17'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-raft-core
          path: raft-core/target/site/jacoco/
          retention-days: 14
          if-no-files-found: ignore

      # Single source of coverage truth for downstream tooling (badges, PR
      # comment, sunburst). Aggregates jacoco.xml from every module that
      # produces one — raft-core / raft-transport-grpc / raft-storage-rocksdb
      # — so the Codecov view reflects the full reactor, not just one module.
      # Scoped to the same ubuntu/JDK17 leg as the local jacoco gate so we
      # don't double-publish from each matrix cell.
      #
      # `token` is supplied via repo secret; for public repos Codecov accepts
      # tokenless uploads but the action prints a noisy warning, so we keep
      # the token wired to the optional secret (graceful no-op if unset).
      - name: Upload coverage to Codecov
        if: success() && matrix.os == 'ubuntu-latest' && matrix.jdk == '17'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            raft-core/target/site/jacoco/jacoco.xml,
            raft-transport-grpc/target/site/jacoco/jacoco.xml,
            raft-storage-rocksdb/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
          # Surface upload errors clearly without breaking the build —
          # the local jacoco gate is the binding check; Codecov is the
          # cross-cutting view.
          verbose: true

      - name: Upload Surefire XMLs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # Names must be unique across matrix legs or upload-artifact@v4
          # rejects the second one with "already exists".
          name: surefire-${{ matrix.os }}-jdk${{ matrix.jdk }}
          path: '**/target/surefire-reports/'
          retention-days: 7
          if-no-files-found: ignore

      - name: Coverage summary
        if: success() && matrix.os == 'ubuntu-latest' && matrix.jdk == '17'
        # Re-derive headline coverage from the CSV so it appears in the
        # workflow Summary tab without an external service.
        run: |
          awk -F, 'NR>1 { ic_m+=$4; ic_c+=$5; br_m+=$6; br_c+=$7; ln_m+=$8; ln_c+=$9 }
          END {
            ic_t=ic_m+ic_c; br_t=br_m+br_c; ln_t=ln_m+ln_c
            printf "## raft-core coverage\n\n"
            printf "| Metric | Covered | Total | %% |\n"
            printf "|--------|--------:|------:|---:|\n"
            printf "| Instructions | %d | %d | %.1f%% |\n", ic_c, ic_t, ic_c*100/ic_t
            printf "| Branches     | %d | %d | %.1f%% |\n", br_c, br_t, br_c*100/br_t
            printf "| Lines        | %d | %d | %.1f%% |\n", ln_c, ln_t, ln_c*100/ln_t
          }' raft-core/target/site/jacoco/jacoco.csv >> "$GITHUB_STEP_SUMMARY"
