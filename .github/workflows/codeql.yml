name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan (Mondays) to catch newly-disclosed query matches.
    - cron: "27 6 * * 1"

jobs:
  analyze:
    name: analyze (java)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      # Compile the whole reactor so CodeQL sees every module. Tests are
      # skipped — CodeQL only needs the bytecode, not green tests.
      - name: Build (compile only)
        run: mvn -B -ntp -DskipTests install

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
